<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKE ERP SYSTEM - FINAL STABLE</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { 
            --erp-primary: #1e293b; --erp-accent: #3b82f6; --erp-bg: #f8fafc;
            --status-red: #ef4444; --status-brown: #9a3412; --status-yellow: #eab308; --status-green: #10b981;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--erp-bg); margin: 0; color: #1e293b; }
        .header { background: var(--erp-primary); display: flex; align-items: center; padding: 0 40px; height: 64px; position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logo { color: white; font-weight: 900; font-size: 20px; margin-right: 50px; }
        .nav-btn { background: none; border: none; color: #94a3b8; font-weight: 700; font-size: 15px; padding: 0 25px; cursor: pointer; height: 100%; transition: 0.3s; }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.1); box-shadow: inset 0 -4px 0 var(--erp-accent); }
        .container { max-width: 1650px; margin: 30px auto; padding: 0 30px; box-sizing: border-box; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .input-section { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .input-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .input-grid input, .input-grid select { flex: 1; min-width: 110px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; font-weight: 700; background: #fcfcfc; }
        .btn-erp { background: var(--erp-primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 800; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        th { background: #f8fafc; padding: 12px; color: #64748b; font-size: 12px; border-bottom: 1px solid #e2e8f0; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 13px; font-weight: 600; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 800; display: inline-block; }
        .status-mi { background: #fee2e2; color: #991b1b; } 
        .status-part { background: #fef9c3; color: #854d0e; } 
        .status-ok { background: #dcfce7; color: #166534; } 
        .del-btn { color: #ef4444; border: 1px solid #fee2e2; background: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 800; }
        .copy-btn { color: var(--erp-accent); border: 1px solid #e0f2fe; background: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 800; }
        .erp-modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .modal-body { background: white; margin: 5% auto; padding: 30px; border-radius: 16px; width: 90%; max-width: 950px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">SKE ERP SYSTEM</div>
    <div class="nav-group">
        <button id="nav-stock" class="nav-btn active" onclick="switchPage('stock')">통합 재고 관리</button>
        <button id="nav-materials" class="nav-btn" onclick="switchPage('materials')">사급 자재 현황</button>
    </div>
</header>

<div class="container">
    <div id="page-materials" class="page-content active">
        <div id="ma-dash" class="dash-container"></div>
        <div class="input-section">
            <div class="input-grid">
                <input type="date" id="ma-date"><input type="text" id="ma-project" placeholder="프로젝트">
                <input type="text" id="ma-vendor" placeholder="업체명"><input type="text" id="ma-item" placeholder="자재명">
                <input type="number" id="ma-req" placeholder="발주수량"><input type="text" id="ma-receiver" placeholder="수령인">
                <button class="btn-erp" onclick="addData('material')">발주 등록</button>
            </div>
        </div>
        <table>
            <thead><tr><th>발주일</th><th>프로젝트</th><th>업체</th><th>품명(이력)</th><th>수령인</th><th>발주량</th><th>입고합계</th><th>상태</th><th>관리</th></tr></thead>
            <tbody id="ma-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const MATERIAL_URL = "https://ske-0001-default-rtdb.firebaseio.com/inventory.json";
    let db = { material: [] };

    async function loadMaterials() {
        try {
            const res = await fetch(MATERIAL_URL);
            const data = await res.json();
            db.material = data ? Object.values(data) : [];
            renderMaterials();
        } catch (e) { console.error("데이터 로드 실패", e); }
    }

    // 📍 구형 데이터와 신규 데이터 호환 처리 핵심 함수
    function getSafeRecv(m) {
        if (m.history && m.history.length > 0) {
            return m.history.reduce((sum, h) => sum + Number(h.qty || 0), 0);
        }
        return Number(m.inQty || m.recvQty || 0); // 기존 단일 입고량 필드 참조
    }

    function getSafeDate(m) {
        return m.date || m.regDate || (m.timestamp ? new Date(m.timestamp).toISOString().split('T')[0] : "-");
    }

    function renderMaterials() {
        const today = new Date();
        document.getElementById('ma-table-body').innerHTML = db.material.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)).map((m) => {
            const req = Number(m.targetQty || m.reqQty || 0);
            const recv = getSafeRecv(m);
            const d = getSafeDate(m);
            let badge = recv === 0 ? '<span class="badge status-mi">미입고</span>' : (recv < req ? '<span class="badge status-part">부분입고</span>' : '<span class="badge status-ok">입고완료</span>');

            return `<tr>
                <td>${d}</td><td>${m.project || '-'}</td><td>${m.vendor || '-'}</td>
                <td>${m.item || '품명없음'}</td><td>${m.receiver || '-'}</td>
                <td>${req.toLocaleString()}</td><td style="color:#3b82f6; font-weight:900;">${recv.toLocaleString()}</td>
                <td>${badge}</td>
                <td><button class="del-btn" onclick="deleteData('material', ${m.timestamp})">삭제</button></td>
            </tr>`;
        }).join('');
    }

    async function saveData(type) { 
        await fetch(MATERIAL_URL, { method: 'PUT', body: JSON.stringify(db.material) }); 
        loadMaterials(); 
    }

    loadMaterials();
</script>
</body>
</html>
