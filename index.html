<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKE 단일 통합 ERP</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { 
            --erp-primary: #1e293b; --erp-accent: #3b82f6; --erp-bg: #f8fafc;
            --status-red: #ef4444; --status-brown: #9a3412; --status-yellow: #eab308; --status-green: #10b981;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--erp-bg); margin: 0; color: #1e293b; }
        .header { background: var(--erp-primary); display: flex; align-items: center; padding: 0 40px; height: 64px; position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logo { color: white; font-weight: 900; font-size: 20px; margin-right: 50px; }
        .container { max-width: 1750px; margin: 30px auto; padding: 0 30px; box-sizing: border-box; }
        .input-section { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
        input { padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; font-weight: 700; background: #fcfcfc; width: 100%; box-sizing: border-box; }
        .btn-erp { background: var(--erp-primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 800; cursor: pointer; grid-column: 1 / -1; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        th { background: #f8fafc; padding: 12px; color: #64748b; font-size: 12px; border-bottom: 1px solid #e2e8f0; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 13px; font-weight: 600; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; }
        .status-mi { background: #fee2e2; color: #991b1b; } 
        .status-part { background: #fef3c7; color: #92400e; } 
        .status-ok { background: #dcfce7; color: #166534; } 
        .dash-container { display: flex; gap: 20px; overflow-x: auto; margin-bottom: 25px; padding: 5px; }
        .dash-card { min-width: 300px; background: #fff; border-radius: 12px; padding: 20px; border-left: 6px solid var(--erp-accent); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">SKE ERP (SINGLE)</div>
</header>

<div class="container">
    <div id="ma-dash" class="dash-container"></div>

    <div class="input-section">
        <div class="input-grid">
            <input type="date" id="pRegDate">
            <input type="text" id="pName" placeholder="프로젝트명">
            <input type="text" id="pOrder" placeholder="발주번호">
            <input type="text" id="pVendor" placeholder="업체명">
            <input type="text" id="pItem" placeholder="자재명">
            <input type="text" id="pReceiver" placeholder="수령인">
            <input type="number" id="pTargetQty" placeholder="필요수량">
            <input type="number" id="pInQty" placeholder="입고수량">
            <input type="text" id="pRemark" placeholder="비고">
            <button class="btn-erp" onclick="addItem()">데이터 저장 및 동기화</button>
        </div>
    </div>

    <table>
        <thead>
            <tr><th>등록일자</th><th>프로젝트명</th><th>발주번호</th><th>업체명</th><th>자재명</th><th>수령인</th><th>필요</th><th>입고</th><th>상태</th><th>비고</th><th>관리</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // 📍 단일 파이어베이스 주소 고정 (SKE-0001 데이터 경로 사용)
    const DB_URL = "https://ske-0001-default-rtdb.firebaseio.com/inventory.json";
    let inventory = [];

    async function loadData() {
        const res = await fetch(DB_URL);
        const data = await res.json();
        // 데이터 보정: 형식이 배열이든 객체든 리스트로 변환
        inventory = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
        renderDashboard();
        renderTable();
    }

    function renderDashboard() {
        const vMap = {};
        inventory.forEach(m => {
            if(!m.vendor) return;
            if(!vMap[m.vendor]) vMap[m.vendor] = { total: 0, ok: 0 };
            const req = Number(m.targetQty || m.reqQty || 0);
            const recv = Number(m.inQty || m.recvQty || 0);
            vMap[m.vendor].total++; if(recv >= req && req > 0) vMap[m.vendor].ok++;
        });
        document.getElementById('ma-dash').innerHTML = Object.keys(vMap).sort().map(v => {
            const per = Math.round((vMap[v].ok / vMap[v].total) * 100) || 0;
            return `<div class="dash-card">
                <div style="font-size:16px; font-weight:800;">${v}</div>
                <div style="font-size:20px; font-weight:900; color:var(--erp-accent);">${per}% 완료</div>
            </div>`;
        }).join('');
    }

    function renderTable() {
        document.getElementById('tableBody').innerHTML = inventory.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)).map((m, idx) => {
            const req = Number(m.targetQty || m.reqQty || 0);
            const recv = Number(m.inQty || m.recvQty || 0);
            const rem = req - recv;
            let badge = recv === 0 ? '<span class="badge status-mi">미입고</span>' : (rem > 0 ? '<span class="badge status-part">부분입고</span>' : '<span class="badge status-ok">입고완료</span>');

            return `<tr>
                <td>${m.regDate || m.date || '-'}</td>
                <td>${m.project || '-'}</td>
                <td>${m.order || '-'}</td>
                <td>${m.vendor || '-'}</td>
                <td>${m.item || '-'}</td>
                <td>${m.receiver || '-'}</td>
                <td>${req}</td>
                <td style="color:var(--erp-accent)">${recv}</td>
                <td>${badge}</td>
                <td>${m.remark || '-'}</td>
                <td><button onclick="deleteItem(${idx})" style="color:red; cursor:pointer; border:none; background:none;">삭제</button></td>
            </tr>`;
        }).join('');
    }

    async function addItem() {
        const item = { 
            regDate: document.getElementById('pRegDate').value, 
            project: document.getElementById('pName').value, 
            order: document.getElementById('pOrder').value,
            vendor: document.getElementById('pVendor').value, 
            item: document.getElementById('pItem').value, 
            receiver: document.getElementById('pReceiver').value,
            targetQty: Number(document.getElementById('pTargetQty').value), 
            inQty: Number(document.getElementById('pInQty').value), 
            remark: document.getElementById('pRemark').value,
            timestamp: Date.now() 
        };
        inventory.push(item);
        await saveData();
    }

    async function deleteItem(idx) {
        if(!confirm("삭제하시겠습니까?")) return;
        inventory.splice(idx, 1);
        await saveData();
    }

    async function saveData() {
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(inventory) });
        loadData();
    }

    document.getElementById('pRegDate').value = new Date().toISOString().split('T')[0];
    loadData();
</script>
</body>
</html>
